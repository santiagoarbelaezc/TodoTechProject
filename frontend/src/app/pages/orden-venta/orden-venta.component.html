<div class="body">
    <div class="orden-venta-container">
        <h2>Orden de Venta</h2>

        <div class="orden-venta-form">
            <form [formGroup]="reportForm" (ngSubmit)="onSubmit()" novalidate>
                <div class="input-group">
                    <label for="nombre">Nombre Cliente</label>
                    <input type="text" id="nombre" formControlName="nombre"/>
                </div>

                <div class="input-group">
                    <label for="correo">Correo</label>
                    <input type="email" id="correo" formControlName="correo"/>
                </div>

                <div class="input-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" formControlName="telefono"/>
                </div>

                <div class="input-group">
                    <label for="clave">Clave Secreta</label>
                    <input type="password" id="clave" formControlName="claveSecreta"/>
                </div>
                <table mat-table [dataSource]="carritoItems" class="mat-elevation-z8">
                    <ng-container matColumnDef="image">
                        <th mat-header-cell *matHeaderCellDef>Image</th>
                        <td mat-cell *matCellDef="let element"><img
                                [src]="'assets/laptop'+ element.producto.id+'.png'"/></td>
                        <td mat-footer-cell *matFooterCellDef></td>

                    </ng-container>
                    <!-- Name Column -->
                    <ng-container matColumnDef="producto">
                        <th mat-header-cell *matHeaderCellDef>Producto</th>
                        <td mat-cell *matCellDef="let element"> {{ element.producto.nombre }}</td>
                        <td mat-footer-cell *matFooterCellDef> Total :</td>
                    </ng-container>

                    <!-- Cantidad Column -->
                    <ng-container matColumnDef="cantidad">
                        <th mat-header-cell *matHeaderCellDef>Cantidad</th>
                        <td mat-cell *matCellDef="let element"> {{ element.cantidad }}</td>
                        <td mat-footer-cell *matFooterCellDef>{{ carritoService.getTotalItems() }}</td>
                    </ng-container>

                    <!-- Precio Column -->
                    <ng-container matColumnDef="subtotal">
                        <th mat-header-cell *matHeaderCellDef>Subtotal</th>
                        <td mat-cell *matCellDef="let element"> {{ element.subtotal }}</td>
                        <td mat-footer-cell *matFooterCellDef> {{ carritoService.getTotal() }}</td>
                    </ng-container>


                    <tr mat-header-row *matHeaderRowDef="columnsList"></tr>
                    <tr mat-row *matRowDef="let row; columns: columnsList;"></tr>
                    <tr mat-footer-row *matFooterRowDef="columnsList"></tr>

                </table>

                <button type="submit" [disabled]="reportForm.invalid || !this.carritoItems || this.carritoItems.length === 0">Crear Nueva Orden</button>
            </form>
        </div>
    </div>
</div>
