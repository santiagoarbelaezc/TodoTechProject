# Conexión a base de datos Oracle (usando Pluggable Database: XEPDB1)
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=C##techAdmin
spring.datasource.password=0000
#spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
#spring.datasource.username=C##techAdmin
#spring.datasource.password=0000
# Driver JDBC para Oracle
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
#spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Dialecto de Hibernate para Oracle 12c
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
#
# Codificaci?n de fecha
#spring.datasource.hikari.connection-init-sql=ALTER SESSION SET NLS_DATE_FORMAT = 'YYYY-MM-DD'

spring.datasource.url=jdbc:mysql://localhost:3306/todoTech
spring.datasource.username=root
spring.datasource.password=0000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect



# Mostrar SQL generado por Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DDL Auto (para crear/actualizar automáticamente las tablas)
# DDL Auto (para crear/actualizar autom?ticamente las tablas)
spring.jpa.hibernate.ddl-auto=update

# Codificación de fecha
spring.datasource.hikari.connection-init-sql=ALTER SESSION SET NLS_DATE_FORMAT = 'YYYY-MM-DD'
# Habilitar ejecución de data.sql
# Codificaci?n de fecha
#spring.datasource.hikari.connection-init-sql=ALTER SESSION SET NLS_DATE_FORMAT = 'YYYY-MM-DD'
# Habilitar ejecuci?n de data.sql
spring.sql.init.mode=always
# Not stop if failure
spring.sql.init.continue-on-error=true


#Allow access pages with Angular
spring.mvc.pathmatch.matching-strategy=ant_path_matcher


